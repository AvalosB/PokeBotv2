# A generic, project-specific alembic configuration file.
# See: https://alembic.sqlalchemy.org/en/latest/files.html

[alembic]
# path to migration scripts
script_location = alembic

# template for new migration files
# file_template = %%(rev)s_%%(slug)s

# The database URL is set dynamically in alembic/env.py from your .env file.
# This line is a placeholder and is not used by the provided setup.
sqlalchemy.url = postgresql+asyncpg://user:password@host:port/database

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S